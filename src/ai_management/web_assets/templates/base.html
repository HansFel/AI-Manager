<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Management Hub{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">AI</span>
          <span>
            <strong>AI Manager</strong>
            <small>Control Hub</small>
          </span>
        </div>
        <nav class="nav">
          <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">Dashboard</a>
          <a href="/registry" class="{{ 'active' if request.url.path == '/registry' else '' }}">Registry</a>
          <a href="/models" class="{{ 'active' if request.url.path == '/models' else '' }}">Modelle</a>
        </nav>
      </aside>
      <main class="main">
        <header class="topbar">
          <div>
            <h1>{% block heading %}AI Management Hub{% endblock %}</h1>
            <p>{% block subheading %}Agents, Skills und Modelle gemeinsam steuern.{% endblock %}</p>
          </div>
          <form method="post" action="/logout">
            <span class="user-pill">{{ user.username }} · {{ user.role }}</span>
            <button type="submit" class="ghost-button">Abmelden</button>
          </form>
        </header>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
